    <style>
        /* CSS Custom Properties for Branding */
        :root {
            --primary-color: #64748b; /* Slate gray for a sophisticated feel */
            --secondary-color: #4fd1c5; /* Teal for a modern accent */
            --background-dark: #1e293b; /* Dark navy for the main background */
            --background-lighter: #334155; /* Slightly lighter for sections */
            --text-primary: #f8fafc; /* Off-white for primary text */
            --text-secondary: #cbd5e0; /* Light gray for labels and secondary text */
            --border-color: #475569; /* Subtle border color */
            --focus-ring: rgba(79, 209, 197, 0.4); /* Teal focus ring */
            --font-family-base: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif; /* Modern, clean base font */
            --font-family-monospace: 'Consolas', 'Menlo', 'Courier New', monospace; /* Classic monospace font */
            --card-bg-selected: #4a5568; /* Selected card background */
            --card-border-selected: var(--secondary-color); /* Selected card border */
            --tab-inactive-bg: #2d3748;
            --tab-active-bg: var(--background-lighter);
        }

        /* Reset and Base Styles */
        body {
            background-color: var(--background-dark);
            color: var(--text-primary);
            font-family: var(--font-family-base);
            padding: 25px;
            line-height: 1.6;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* 初回ロード時にコンテンツが一部表示されない問題を回避するため、
               デフォルトで表示状態にしておく。Web Componentsが完全にロードされた後、
               JavaScriptで必要に応じて非表示にするロジックを実装 */
            visibility: visible;
            opacity: 1;
            transition: opacity 0.3s ease-in-out;
        }
        
        /* JavaScriptで全てがロードされるまで非表示にするためのクラス */
        body.loading {
            visibility: hidden;
            opacity: 0;
        }

        /* Headings */
        h1 {
            color: var(--secondary-color);
            text-align: center;
            margin-bottom: 8px;
            font-size: 2.8em;
            font-weight: 600;
            letter-spacing: -0.015em;
            text-shadow: 0 2px 6px rgba(79, 209, 197, 0.2);
        }

        .creator-info {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 35px;
            font-size: 1.1em;
            font-weight: 300;
        }

        /* Global Input Elements Style (applied to native elements and inherited by Web Components) */
        label {
            display: block;
            margin-top: 22px;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 1em;
            letter-spacing: 0.01em;
        }

        select, input[type="text"], input[type="number"], textarea {
            width: calc(100% - 30px);
            padding: 14px 15px;
            margin-top: 5px;
            margin-bottom: 22px;
            background-color: var(--background-lighter);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.15);
            transition: all 0.15s ease-in-out;
        }
        select:focus, input[type="text"]:focus, input[type="number"]:focus, textarea:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 2px var(--focus-ring);
            outline: none;
            background-color: #4a5568;
        }
        input::placeholder, textarea::placeholder {
            color: #a0aec0;
        }

        /* Select specific arrow styling */
        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23a0aec0" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 22px;
            padding-right: 40px;
        }

        #prompt_output {
            width: calc(100% - 30px); /* Web ComponentのShadow DOM外の要素 */
            height: 300px;
            resize: vertical;
            font-family: var(--font-family-monospace);
            line-height: 1.4;
            font-size: 0.95em;
        }

        .graduation-effort-item, .additionalConstraintInput {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
            background-color: #2d3748;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        .graduation-effort-item input, .additionalConstraintInput input {
            flex-grow: 1;
            margin-right: 0;
            margin-top: 0;
            margin-bottom: 0;
            width: auto;
            background-color: var(--background-dark);
            border: 1px solid var(--border-color);
            box-shadow: none;
            padding: 8px 10px;
        }

        .graduation-effort-item button, .additionalConstraintInput button {
            margin-top: 0;
            padding: 7px 14px;
            font-size: 0.9em;
            font-weight: normal;
            background-color: #e53e3e;
            box-shadow: none;
            transform: none;
            border-radius: 3px;
            color: var(--text-primary); /* Button text color */
        }
        .graduation-effort-item button:hover, .additionalConstraintInput button:hover {
            background-color: #c53030;
            transform: translateY(-1px);
            box-shadow: 0 2px 4px rgba(229, 62, 62, 0.2);
        }

        /* Responsive Adjustments */
        @media (max-width: 1200px) {
            h1 { font-size: 2.6em; }
        }

        @media (max-width: 992px) {
            h1 { font-size: 2.4em; }
            button { padding: 12px 24px; font-size: 1em; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.2em; }
            .creator-info { font-size: 1.0em; margin-bottom: 25px; }
            select, input[type="text"], input[type="number"], textarea { width: calc(100% - 26px); padding: 10px; font-size: 0.9em; margin-bottom: 18px; }
            button { padding: 10px 20px; font-size: 0.95em; }
            #prompt_output { height: 250px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.0em; }
            .creator-info { font-size: 0.9em; margin-bottom: 20px; }
            select, input[type="text"], input[type="number"], textarea { width: calc(100% - 22px); padding: 8px; font-size: 0.85em; margin-bottom: 15px; }
            button { padding: 8px 16px; font-size: 0.9em; margin-top: 20px; }
            #prompt_output { height: 200px; }
        }
    </style>
</head>

    <script>
        // === Service Worker の登録 ===
        // PWAとして機能させるためのService Worker
        // Data URIとして直接HTMLに埋め込む場合、ブラウザのセキュリティ制約でCORSエラーや登録失敗が起こりやすい。
        // デプロイ時には、manifest.json と service-worker.js は別ファイルとして提供するのがベストプラクティス。
        // ここでは単一ファイル要件のため、引き続き埋め込み形式を維持し、発生しうる警告は無視する想定。
        // 登録失敗してもUIが機能するように、Service Workerの処理をUIのロードから分離。
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Service Workerの内容をbase64でエンコード
                const serviceWorkerContent = `
                    self.addEventListener('install', (event) => {
                        console.log('[Service Worker] Installing...');
                        event.waitUntil(
                            caches.open('promptflow-pro-v3').then((cache) => {
                                console.log('[Service Worker] Caching all content');
                                // ここにキャッシュしたいリソースのパスを追加
                                return cache.addAll(['/']); // HTMLファイル自体をキャッシュ
                            })
                        );
                    });

                    self.addEventListener('activate', (event) => {
                        console.log('[Service Worker] Activating...');
                        event.waitUntil(
                            caches.keys().then((cacheNames) => {
                                return Promise.all(
                                    cacheNames.map((cacheName) => {
                                        if (cacheName !== 'promptflow-pro-v3') {
                                            console.log('[Service Worker] Deleting old cache:', cacheName);
                                            return caches.delete(cacheName);
                                        }
                                    })
                                );
                            })
                        );
                        return self.clients.claim();
                    });

                    self.addEventListener('fetch', (event) => {
                        // manifest.json を Data URI で提供
                        if (event.request.url.endsWith('/manifest.json')) {
                            const manifest = {
                                "name": "PromptFlow Pro",
                                "short_name": "PromptFlow",
                                "description": "AI協調作業のための統合プロンプト開発環境",
                                "start_url": "./",
                                "display": "standalone",
                                "background_color": "#1e293b",
                                "theme_color": "#4fd1c5",
                                "icons": [
                                    {
                                        "src": "data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMjQgMjQiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yNDMyL3N2ZyI+PHBhdGggZmlsbD0iIzRmZDFjNSIgZD0iTTEyIDJjNS41MiAwIDEwIDQuNDggMTAgMTBzLTQuNDggMTAtMTAgMTAtMTAtNC40OC0xMC0xMCAxMC0xMCAxMC0xem0tMS41IDcuNWgzaDFsMS45Ny01LjMyLS42MS0uNjItLjEtLjEtLjA2LjA2LTQuMzYgNC4zNmExLjc1MiAx.NzUyIDAgMCAwLS4xOSAyLjc3IDEuNzUyIDEuNzUyIDAgMCAwLTIuNzctLjE5bC0uNTUtLjU1MS4wNi0uMDYHMTcuNTIgMS43NTIgMCAwIDAtLjE5LTIyLjc3IDEuNzUyIDEuNzUyIDAgMCAwLTIuNzctLjE5bC0yLjAyIDIuMDJsLTUuMzItMS45N3oiLz48L3N2Zz4=",
                                        "sizes": "192x192",
                                        "type": "image/svg+xml"
                                    },
                                    {
                                        "src": "data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMjQgMjQiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yNDMyL3N2ZyI+PHBhdGggZD0iTTEyIDJjMi41IDAtNS4zNiAyLjgtNS4zNiA2LjU2czQuMSAyLjIgNS4zNiA2LjczLTRuMS00LjI1LTUuMzYtMS43My0uNTIgMi44NyAwIDIuNjkgMS41My0uODEgMCAwLTIuNzQtNS42OSAwLTcuMTIgMi41Ni0uNjcgNy42Ny0xLjAyIDEwLjA4LTEuNDEgMi40MS0uNCA1LjE1LS42OCA3LjE1LS42OEwxMiAyYzUuNTIgMCAxMCA0LjQ4IDEwIDEwcy00LjQ4IDEwLTEwIDEwLTEwLTQuNDgtMTAtMTAgMTAtMTAgMTAtMXptLTEuNSA3LjVoM2gxTDEuOTctNS4zMi0uNjEtLjYyLS4wMS4wMS00LjM2IDQuMzZhMS43NTIgMS43NTIgMCAwIDAtLjE5IDIuNzcgMS43NTIgMS43NTIgMCAwIDAtMi43Ny0uMTlsLS41NS0uNTUxLjA2LS4wN0wxNy41MiAxLjc1MiAwIDAgMC0uMTktMi43NyAxLjc1MiAxLjc1MiAwIDAgMC0yLjc3LS4xOWwtMi4wMiAyLjAybC01LjMyLTEuOTd6Ii8+PC9zdmc+",
                                        "sizes": "512x512",
                                        "type": "image/svg+xml"
                                    }
                                ]
                            };
                            const response = new Response(JSON.stringify(manifest), {
                                headers: { 'Content-Type': 'application/manifest+json' }
                            });
                            event.respondWith(response);
                            return; // manifest.json の処理で終了
                        }

                        // その他のリクエストはキャッシュから、またはネットワークから取得
                        event.respondWith(
                            caches.match(event.request).then((response) => {
                                return response || fetch(event.request);
                            })
                        );
                    });
                `;
                // Service Workerの登録
                navigator.serviceWorker.register('data:application/javascript;base64,' + btoa(serviceWorkerContent.replace(/\s+/g, ' ')))
                    .then(() => console.log('Service Worker registered successfully.'))
                    .catch(error => console.error('Service Worker registration failed:', error));
            });
        }

        // === IndexedDB ヘルパー ===
        const DB_NAME = 'PromptFlowDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'prompts';

        let db;

        function openDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onupgradeneeded = (event) => {
                    db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                    }
                    console.log('IndexedDB upgrade or creation complete.');
                };

                request.onsuccess = (event) => {
                    db = event.target.result;
                    console.log('IndexedDB opened successfully.');
                    resolve(db);
                };

                request.onerror = (event) => {
                    console.error('IndexedDB error:', event.target.errorCode, event.target.error);
                    reject(event.target.error);
                };
            });
        }

        async function saveData(data) {
            try {
                if (!db) await openDatabase();
                const transaction = db.transaction(STORE_NAME, 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.put({ id: 'currentPrompt', data: data }); // 単一の"currentPrompt"エントリとして保存
                return new Promise((resolve, reject) => {
                    transaction.oncomplete = () => {
                        // console.log("State saved to IndexedDB.");
                        resolve();
                    };
                    transaction.onerror = (event) => {
                        console.error('Save data transaction error:', event.target.error);
                        reject(event.target.error);
                    };
                });
            } catch (e) {
                console.error('Error in saveData:', e);
            }
        }

        async function loadData() {
            try {
                if (!db) await openDatabase();
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get('currentPrompt');

            connectedCallback() {
                this.setupTabListeners();
                this.setupConstraintItemListeners();
                this.setupSearchFunctionality();
                this.setupCustomConstraintAddition();
                this.updateSelectedConstraintsSummary(); // 起動時に概要を更新
            }

            setupTabListeners() {
                this.shadowRoot.querySelectorAll('.constraint-tab-button').forEach(button => {
                    button.addEventListener('click', (e) => {
                        this.shadowRoot.querySelectorAll('.constraint-tab-button').forEach(btn => btn.classList.remove('active'));
                        this.shadowRoot.querySelectorAll('.constraint-tab-content').forEach(content => content.classList.remove('active'));

                        e.target.classList.add('active');
                        const category = e.target.dataset.category;
                        this.shadowRoot.getElementById(`tabContent_${category}`).classList.add('active');
                        
                        const searchInput = this.shadowRoot.getElementById('constraintSearch');
                        if (searchInput) {
                            searchInput.value = '';
                            this.filterConstraints();
                        }
                    });
                });
            }

            setupConstraintItemListeners() {
                this.shadowRoot.querySelectorAll('.constraint-item').forEach(item => {
                    item.addEventListener('click', (event) => {
                        const checkbox = item.querySelector('input[type="checkbox"]');
                        if (!checkbox) {
                            console.error('Checkbox not found in constraint-item:', item);
                            return;
                        }

                        // クリックされたのが入力フィールド自身でなければチェックボックスの状態を反転
                        const targetTagName = event.target.tagName.toLowerCase();
                        if (targetTagName !== 'input' && targetTagName !== 'label') {
                            checkbox.checked = !checkbox.checked;
                        } else if (targetTagName === 'input' && (event.target.type === 'number' || event.target.type === 'text')) {
                            // 数値入力やテキスト入力のクリックはチェックボックスの状態を変更しない
                            event.stopPropagation();
                        }
                       
                        item.classList.toggle('selected', checkbox.checked);

                        const numericInput = item.querySelector('input[type="number"]');
                        const textInput = item.querySelector('input[type="text"]');

                        if (numericInput) {
                            this.toggleInputVisibility(checkbox.checked, numericInput);
                        } else if (textInput) {
                            this.toggleInputVisibility(checkbox.checked, textInput);
                        }
                        this.updateSelectedConstraintsSummary();
                        this.dispatchEvent(new CustomEvent('constraints-changed', { detail: this.selectedConstraints, bubbles: true, composed: true }));
                    });

                    const numericInput = item.querySelector('input[type="number"]');
                    const textInput = item.querySelector('input[type="text"]');
                    if (numericInput) {
                        numericInput.addEventListener('input', () => {
                            this.updateSelectedConstraintsSummary();
                            this.dispatchEvent(new CustomEvent('constraints-changed', { detail: this.selectedConstraints, bubbles: true, composed: true }));
                        });
                        this.toggleInputVisibility(item.classList.contains('selected'), numericInput);
                    }
                    if (textInput) {
                        textInput.addEventListener('input', () => {
                            this.updateSelectedConstraintsSummary();
                            this.dispatchEvent(new CustomEvent('constraints-changed', { detail: this.selectedConstraints, bubbles: true, composed: true }));
                        });
                        this.toggleInputVisibility(item.classList.contains('selected'), textInput);
                    }
                });
            }

            toggleInputVisibility(isChecked, inputElement) {
                const parentGroup = inputElement.closest('.numeric-constraint-group') || inputElement.closest('.text-constraint-group');
                if (parentGroup) {
                    parentGroup.style.display = isChecked ? 'flex' : 'none';
                }
            }

            setupSearchFunctionality() {
                const searchInput = this.shadowRoot.getElementById('constraintSearch');
                if (searchInput) {
                    searchInput.addEventListener('keyup', () => this.filterConstraints());
                } else {
                    console.error('ConstraintSelector: Search input not found.');
                }
            }

            filterConstraints() {
                const searchInput = this.shadowRoot.getElementById('constraintSearch');
                if (!searchInput) return;

                const searchTerm = searchInput.value.toLowerCase();
                const activeTabContent = this.shadowRoot.querySelector('.constraint-tab-content.active');
                
                if (!activeTabContent) return;

                const constraintItems = activeTabContent.querySelectorAll('.constraint-item');
                constraintItems.forEach(item => {
                    const label = item.querySelector('label');
                    if (label) {
                        const labelText = label.textContent.toLowerCase();
                        const shouldShow = labelText.includes(searchTerm);
                        item.style.display = shouldShow ? 'flex' : 'none';
                    }
                });
            }

            setupCustomConstraintAddition() {
                const addButton = this.shadowRoot.getElementById('addCustomConstraintButton');
                const customInput = this.shadowRoot.getElementById('customConstraintInput');

                if (addButton && customInput) {
                    addButton.addEventListener('click', () => this.addCustomConstraint());
                    customInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            this.addCustomConstraint();
                        }
                    });
                } else {
                    console.error('ConstraintSelector: Custom constraint add button or input not found.');
                }
            }

            addCustomConstraint() {
                const customInput = this.shadowRoot.getElementById("customConstraintInput");
                if (!customInput) return;

                const customValue = customInput.value.trim();
                if (customValue === "") {
                    alert("追加する制約条件を入力してください。");
                    return;
                }

                const existingCustomInputs = Array.from(this.shadowRoot.querySelectorAll('#additionalConstraints .additionalConstraint'));
                const isDuplicate = existingCustomInputs.some(input => input.value.trim() === customValue);
                
                if (isDuplicate) {
                    alert("その制約条件は既に追加されています。");
                    return;
                }

                const container = this.shadowRoot.getElementById("additionalConstraints");
                if (!container) {
                    console.error('ConstraintSelector: Custom constraints container not found.');
                    return;
                }

                const newConstraintWrapper = document.createElement("div");
                newConstraintWrapper.className = "additionalConstraintInput";
                
                const uniqueId = `custom_${Date.now()}`;

                newConstraintWrapper.innerHTML = `
                    <input type="checkbox" id="${uniqueId}" name="constraints" value="${escapeHTML(customValue)}" checked style="display:none;">
                    <input type="text" class="additionalConstraint" value="${escapeHTML(customValue)}" readonly>
                    <button type="button" data-checkbox-id="${uniqueId}">削除</button>
                `;
                container.appendChild(newConstraintWrapper);
                customInput.value = ""; 

                const removeButton = newConstraintWrapper.querySelector('button');
                if (removeButton) {
                    removeButton.addEventListener('click', (e) => {
                        const cbId = e.target.dataset.checkboxId;
                        const checkbox = this.shadowRoot.getElementById(cbId);
                        if (checkbox) checkbox.checked = false;
                        e.target.closest('.additionalConstraintInput')?.remove();
                        this.updateSelectedConstraintsSummary();
                        this.dispatchEvent(new CustomEvent('constraints-changed', { detail: this.selectedConstraints, bubbles: true, composed: true }));
                    });
                } else {
                    console.error('ConstraintSelector: Remove button for custom constraint not found.');
                }

                this.updateSelectedConstraintsSummary();
                this.dispatchEvent(new CustomEvent('constraints-changed', { detail: this.selectedConstraints, bubbles: true, composed: true }));
            }

            updateSelectedConstraintsSummary() {
                const selectedList = this.shadowRoot.getElementById('selectedConstraintsList');
                if (!selectedList) {
                    console.error('ConstraintSelector: Selected constraints list not found.');
                    return;
                }
                selectedList.innerHTML = '';

                this.shadowRoot.querySelectorAll('.constraint-grid input[type="checkbox"]:checked, #additionalConstraints input[type="checkbox"]:checked').forEach(checkbox => {
                    let value = checkbox.value;
                    let displayValue = value; // Summary tag value

                    // Handle numeric/text associated inputs
                    if (checkbox.id === 'improve') {
                        const countInput = this.shadowRoot.getElementById('improveCount');
                        const count = countInput ? countInput.value : '〇';
                        displayValue = `${count}回改善を繰り返す`;
                    } else if (checkbox.id === 'age') {
                        const countInput = this.shadowRoot.getElementById('ageCount');
                        const count = countInput ? countInput.value : '〇';
                        displayValue = `${count}才でも分かる言葉で`;
                    } else if (checkbox.id === 'char_limit') {
                        const countInput = this.shadowRoot.getElementById('charLimitCount');
                        const count = countInput ? countInput.value : '〇';
                        displayValue = `${count}文字以内に収める`;
                    } else if (checkbox.id === 'paragraph_count') {
                        const countInput = this.shadowRoot.getElementById('paragraphCount');
                        const count = countInput ? countInput.value : '〇';
                        displayValue = `${count}段落で構成`;
                    } else if (checkbox.id === 'option_count') {
                        const countInput = this.shadowRoot.getElementById('optionCount');
                        const count = countInput ? countInput.value : '〇';
                        displayValue = `${count}つの選択肢を提示`;
                    } else if (checkbox.id === 'graph_type') {
                        const textInput = this.shadowRoot.getElementById('graphTypeInput');
                        const text = textInput ? textInput.value : '';
                        displayValue = `グラフの種類を指定 (${text || '未指定'})`;
                    } else if (checkbox.id === 'role_play') {
                        const textInput = this.shadowRoot.getElementById('rolePlayInput');
                        const text = textInput ? textInput.value : '';
                        displayValue = `ロールプレイを指定 (${text || '未指定'})`;
                    }
                    
                    const isCustom = checkbox.closest('#additionalConstraints') !== null;
                    this.addTagToSummary(displayValue, checkbox.id, isCustom);
                });
            }

            addTagToSummary(text, checkboxId, isCustom = false) {
                const selectedList = this.shadowRoot.getElementById('selectedConstraintsList');
                if (!selectedList) return;

                const listItem = document.createElement('li');
                listItem.textContent = text;
                
                const removeTag = document.createElement('span');
                removeTag.className = 'remove-tag';
                removeTag.textContent = '×';
                removeTag.onclick = () => {
                    const checkbox = this.shadowRoot.getElementById(checkboxId);
                    if (checkbox) {
                        checkbox.checked = false;
                        if (isCustom) {
                            checkbox.closest('.additionalConstraintInput')?.remove();
                        } else {
                            const parentItem = checkbox.closest('.constraint-item');
                            if (parentItem) {
                                parentItem.classList.remove('selected');
                                const numericInput = parentItem.querySelector('input[type="number"]');
                                const textInput = parentItem.querySelector('input[type="text"]');
                                if (numericInput) this.toggleInputVisibility(false, numericInput);
                                if (textInput) this.toggleInputVisibility(false, textInput);
                            }
                        }
                    }
                    this.updateSelectedConstraintsSummary();
                    this.dispatchEvent(new CustomEvent('constraints-changed', { detail: this.selectedConstraints, bubbles: true, composed: true }));
                };
                listItem.appendChild(removeTag);
                selectedList.appendChild(listItem);
            }

            get selectedConstraints() {
                const constraints = [];
                this.shadowRoot.querySelectorAll('.constraint-grid input[type="checkbox"]:checked, #additionalConstraints input[type="checkbox"]:checked').forEach(checkbox => {
                    let value = checkbox.value;
                    if (checkbox.id === 'improve') {
                        const countInput = this.shadowRoot.getElementById('improveCount');
                        const count = countInput ? countInput.value : '〇';
                        value = `${count}回改善を繰り返す`;
                    } else if (checkbox.id === 'age') {
                        const countInput = this.shadowRoot.getElementById('ageCount');
                        const count = countInput ? countInput.value : '〇';
                        value = `${count}才でも分かる言葉で`;
                    } else if (checkbox.id === 'char_limit') {
                        const countInput = this.shadowRoot.getElementById('charLimitCount');
                        const count = countInput ? countInput.value : '〇';
                        value = `${count}文字以内に収める`;
                    } else if (checkbox.id === 'paragraph_count') {
                        const countInput = this.shadowRoot.getElementById('paragraphCount');
                        const count = countInput ? countInput.value : '〇';
                        value = `${count}段落で構成`;
                    } else if (checkbox.id === 'option_count') {
                        const countInput = this.shadowRoot.getElementById('optionCount');
                        const count = countInput ? countInput.value : '〇';
                        value = `${count}つの選択肢を提示`;
                    } else if (checkbox.id === 'graph_type') {
                        const textInput = this.shadowRoot.getElementById('graphTypeInput');
                        const text = textInput ? textInput.value : '';
                        value = `グラフの種類を指定 (${text || '未指定'})`;
                    } else if (checkbox.id === 'role_play') {
                        const textInput = this.shadowRoot.getElementById('rolePlayInput');
                        const text = textInput ? textInput.value : '';
                        value = `ロールプレイを指定 (${text || '未指定'})`;
                    }
                    constraints.push(value);
                });
                return constraints;
            }

            set selectedConstraints(constraintsArray) {
                // Reset all checkboxes and custom constraints
                this.shadowRoot.querySelectorAll('.constraint-grid input[type="checkbox"]').forEach(cb => {
                    cb.checked = false;
                    const item = cb.closest('.constraint-item');
                    if (item) item.classList.remove('selected');
                    const numInput = item.querySelector('input[type="number"]');
                    const textInput = item.querySelector('input[type="text"]');
                    if (numInput) { numInput.value = ''; this.toggleInputVisibility(false, numInput); } // 数値入力も空にする
                    if (textInput) { textInput.value = ''; this.toggleInputVisibility(false, textInput); } // テキスト入力も空にする
                });
                const additionalConstraintsContainer = this.shadowRoot.getElementById('additionalConstraints');
                if (additionalConstraintsContainer) {
                    additionalConstraintsContainer.innerHTML = '';
                }

                constraintsArray.forEach(constraintText => {
                    let found = false;
                    this.shadowRoot.querySelectorAll('.constraint-grid input[type="checkbox"]').forEach(checkbox => {
                        let baseValue = checkbox.value;
                        let associatedInput;

                        if (checkbox.id === 'improve') {
                            associatedInput = this.shadowRoot.getElementById('improveCount');
                            baseValue = `〇回改善を繰り返す`;
                        } else if (checkbox.id === 'age') {
                            associatedInput = this.shadowRoot.getElementById('ageCount');
                            baseValue = `〇才でも分かる言葉で`;
                        } else if (checkbox.id === 'char_limit') {
                            associatedInput = this.shadowRoot.getElementById('charLimitCount');
                            baseValue = `〇文字以内に収める`;
                        } else if (checkbox.id === 'paragraph_count') {
                            associatedInput = this.shadowRoot.getElementById('paragraphCount');
                            baseValue = `〇段落で構成`;
                        } else if (checkbox.id === 'option_count') {
                            associatedInput = this.shadowRoot.getElementById('optionCount');
                            baseValue = `〇つの選択肢を提示`;
                        } else if (checkbox.id === 'graph_type') {
                            associatedInput = this.shadowRoot.getElementById('graphTypeInput');
                            baseValue = `グラフの種類を指定`;
                        } else if (checkbox.id === 'role_play') {
                            associatedInput = this.shadowRoot.getElementById('rolePlayInput');
                            baseValue = `ロールプレイを指定`;
                        }

                        if (constraintText.includes(baseValue)) {
                            checkbox.checked = true;
                            const item = checkbox.closest('.constraint-item');
                            if (item) item.classList.add('selected');

                            if (associatedInput) {
                                const match = constraintText.match(/\(([^)]+)\)|(\d+)/); // Extracts value in parentheses or a number
                                if (match) {
                                    const extractedValue = match[1] || match[2];
                                    associatedInput.value = extractedValue;
                                }
                                this.toggleInputVisibility(true, associatedInput);
                            }
                            found = true;
                            return;
                        }
                    });

                    if (!found) {
                        // Add as a custom constraint
                        const container = this.shadowRoot.getElementById("additionalConstraints");
                        if (!container) {
                            console.error('ConstraintSelector: Custom constraints container not found for setting.');
                            return;
                        }
                        const newConstraintWrapper = document.createElement("div");
                        newConstraintWrapper.className = "additionalConstraintInput";
                        const uniqueId = `custom_${Date.now()}`;
                        newConstraintWrapper.innerHTML = `
                            <input type="checkbox" id="${uniqueId}" name="constraints" value="${escapeHTML(constraintText)}" checked style="display:none;">
                            <input type="text" class="additionalConstraint" value="${escapeHTML(constraintText)}" readonly>
                            <button type="button" data-checkbox-id="${uniqueId}">削除</button>
                        `;
                        container.appendChild(newConstraintWrapper);
                        const removeButton = newConstraintWrapper.querySelector('button');
                        if (removeButton) {
                            removeButton.addEventListener('click', (e) => {
                                const cbId = e.target.dataset.checkboxId;
                                const checkbox = this.shadowRoot.getElementById(cbId);
                                if (checkbox) checkbox.checked = false;
                                e.target.closest('.additionalConstraintInput')?.remove();
                                this.updateSelectedConstraintsSummary();
                                this.dispatchEvent(new CustomEvent('constraints-changed', { detail: this.selectedConstraints, bubbles: true, composed: true }));
                            });
                        }
                    }
                });
                this.updateSelectedConstraintsSummary();
            }
        }
        if (!customElements.get('constraint-selector')) {
            customElements.define('constraint-selector', ConstraintSelector);
        }

        // === グローバルアプリケーションロジック ===

        // DOMContentLoaded後に初期化処理を実行
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('DOMContentLoaded fired. Starting app initialization.');
            document.body.classList.add('loading'); // 全体表示前にbodyを非表示にする

            await openDatabase(); // IndexedDBを開く

            // 各Web Componentの参照を確実に取得
            const getComponent = (selector, fallback = null) => {
                const component = document.querySelector(selector);
                if (!component) {
                    console.error(`Component not found: ${selector}. UI may be incomplete.`);
                    return fallback;
                }
                return component;
            };

            const roleSelect = getComponent('prompt-select#role');
            const otherRoleInput = getComponent('text-input#otherRole');
            const taskSelect = getComponent('prompt-select#task');
            const otherTaskInput = getComponent('text-input#otherTask');
            const promptOutputTextarea = getComponent('textarea-input#prompt_output');
            const generateButton = getComponent('button-component#generatePromptButton');
            const copyButton = getComponent('button-component#copyPromptButton');
            const constraintSelector = getComponent('constraint-selector');
            const topicInput = getComponent('text-input#topic');
            const topicDetailsInput = getComponent('textarea-input#topic_details');
            const eventDetailsInput = getComponent('text-input#event_details'); // Changed to text-input
            const gradeSelect = getComponent('prompt-select#grade');
            const subjectSelect = getComponent('prompt-select#subject');
            const unitInput = getComponent('text-input#unit');
            const evaluationPointInput = getComponent('textarea-input#evaluation_point');
            const essayThemeInput = getComponent('text-input#essay_theme');
            const specificContentInput = getComponent('textarea-input#specific_content');
            const outputFormatSelect = getComponent('prompt-select#output_format');
            const charCountInput = getComponent('numeric-input#char_count');
            const inputTextarea = getComponent('textarea-input#input_text');
            const graduationEffortsContainer = document.getElementById("graduation_efforts_container");


            if (!roleSelect || !taskSelect || !promptOutputTextarea || !generateButton || !copyButton || !constraintSelector) {
                console.error('Critical Web Components not found. UI may be incomplete.');
                // Critical components missing, display fallback message or ensure basic visibility
                document.body.classList.remove('loading');
                return; // Stop further initialization
            }

            // --- UI状態のロードと復元 ---
            try {
                const savedState = await loadData();
                if (savedState) {
                    // 役割はユーザーの希望によりロードしない（常に初期値「教師」）
                    // if (savedState.role) roleSelect.value = savedState.role; // This line is now effectively skipped for loading
                    if (savedState.otherRole) otherRoleInput.value = savedState.otherRole;
                    if (savedState.task) taskSelect.value = savedState.task;
                    if (savedState.otherTask) otherTaskInput.value = savedState.otherTask;
                    if (topicInput) topicInput.value = savedState.topic || "";
                    if (topicDetailsInput) topicDetailsInput.value = savedState.topicDetails || "";
                    if (eventDetailsInput) eventDetailsInput.value = savedState.eventDetails || "";
                    if (gradeSelect) gradeSelect.value = savedState.grade || "";
                    if (subjectSelect) subjectSelect.value = savedState.subject || "";
                    if (unitInput) unitInput.value = savedState.unit || "";
                    if (evaluationPointInput) evaluationPointInput.value = savedState.evaluationPoint || "";
                    if (essayThemeInput) essayThemeInput.value = savedState.essayTheme || "";
                    if (specificContentInput) specificContentInput.value = savedState.specificContent || "";
                    
                    if (graduationEffortsContainer && savedState.graduationEfforts && savedState.graduationEfforts.length > 0) {
                        graduationEffortsContainer.innerHTML = ''; // Clear existing
                        savedState.graduationEfforts.forEach(effort => {
                            const newEffortItem = document.createElement("div");
                            newEffortItem.className = "graduation-effort-item";
                            newEffortItem.innerHTML = `<input type="text" class="graduation_effort" value="${escapeHTML(effort)}"> <button type="button" onclick="window.removeGraduationEffort(this)">削除</button>`;
                            graduationEffortsContainer.appendChild(newEffortItem);
                        });
                    } else if (graduationEffortsContainer) { // Ensure at least one input field is present if no saved data
                        graduationEffortsContainer.innerHTML = `
                            <div class="graduation-effort-item">
                                <input type="text" class="graduation_effort" placeholder="例: 3年間の成長の軌跡" value="">
                                <button type="button" onclick="window.removeGraduationEffort(this)">削除</button>
                            </div>
                        `;
                    }

                    // 以前の変更: savedState.selectedConstraints がない場合にデフォルトを設定
                    // 今回の変更: savedState.selectedConstraints があっても、それをロードするのみ。
                    // savedState.selectedConstraints がない場合は空の配列で初期化される。
                    if (constraintSelector) {
                        constraintSelector.selectedConstraints = savedState.selectedConstraints || [];
                    }

                    if (outputFormatSelect) outputFormatSelect.value = savedState.outputFormat || "";
                    if (charCountInput) charCountInput.value = savedState.charCount || "";
                    if (inputTextarea) inputTextarea.value = savedState.inputText || "";
                    if (promptOutputTextarea) promptOutputTextarea.value = savedState.generatedPrompt || "";

                } else {
                    console.log("No saved state found. Initializing UI to default values and setting default constraints.");
                    resetUI(); // デフォルトUIにリセット
                    if (constraintSelector) {
                        // 初期値として「正確性を重視」「公用文にする」「自然な日本語に校正」を設定
                        constraintSelector.selectedConstraints = ["正確性を重視", "公用文にする", "自然な日本語に校正"];
                    }
                }
            } catch (e) {
                console.error("Failed to load state from IndexedDB or apply to UI:", e);
                resetUI(); // エラー発生時はデフォルト状態に戻す
                if (constraintSelector) {
                    // エラー時もデフォルトの制約条件を設定
                    constraintSelector.selectedConstraints = ["正確性を重視", "公用文にする", "自然な日本語に校正"];
                }
            } finally {
                // ロード後に依存関係を再評価して表示を更新
                // taskSelect.value が空の場合、updateDynamicFields は全て非表示にするはず
                if (taskSelect) {
                    updateDynamicFields(taskSelect.value);
                }
                
                // data-depends-on を持つ要素の初期表示制御
                document.querySelectorAll('[data-depends-on]').forEach(element => {
                    const dependsOnId = element.dataset.dependsOn;
                    const dependsOnElement = document.getElementById(dependsOnId);
                    if (dependsOnElement) {
                        const dependsOnValue = element.dataset.dependsValue;
                        element.style.display = dependsOnElement.value === dependsOnValue ? "block" : "none";
                    }
                });

                // 全ての初期化が完了したらbodyのローディングクラスを削除して表示
                document.body.classList.remove('loading');
                console.log('App initialization complete. UI is now visible.');
            }


            // --- イベントリスナー登録 ---
            roleSelect.addEventListener("value-change", (e) => {
                const dependsOnTarget = otherRoleInput;
                if (dependsOnTarget) {
                    const dependsOnValue = dependsOnTarget.dataset.dependsValue;
                    dependsOnTarget.style.display = e.detail === dependsOnValue ? "block" : "none";
                }
                saveCurrentState();
            });

            taskSelect.addEventListener("value-change", (e) => {
                const dependsOnTarget = otherTaskInput;
                if (dependsOnTarget) {
                    const dependsOnValue = dependsOnTarget.dataset.dependsValue;
                    dependsOnTarget.style.display = e.detail === dependsOnValue ? "block" : "none";
                }
                updateDynamicFields(e.detail);
                saveCurrentState();
            });

            document.querySelectorAll('text-input, textarea-input, numeric-input, prompt-select').forEach(input => {
                input.addEventListener('value-change', saveCurrentState);
            });
            constraintSelector.addEventListener('constraints-changed', saveCurrentState);
            
            if (graduationEffortsContainer) {
                graduationEffortsContainer.addEventListener('input', saveCurrentState);
                graduationEffortsContainer.addEventListener('change', saveCurrentState);
            }

            if (generateButton) {
                generateButton.addEventListener('click', generatePrompt);
            }
            if (copyButton) {
                copyButton.addEventListener('click', copyPrompt);
            }

            // --- ヘルパー関数 ---
            function updateDynamicFields(currentTask) {
                document.querySelectorAll('dynamic-form-group').forEach(group => {
                    const tasksAttr = group.dataset.taskGroup;
                    const singleTaskAttr = group.dataset.task;

                    if (tasksAttr) {
                        try {
                            const tasks = JSON.parse(tasksAttr);
                            group.style.display = tasks.includes(currentTask) ? "block" : "none";
                        } catch (e) {
                            console.error("Error parsing data-task-group JSON for", group.id, ":", e);
                            group.style.display = "none";
                        }
                    } else if (singleTaskAttr) {
                        group.style.display = singleTaskAttr === currentTask ? "block" : "none";
                    } else {
                        group.style.display = "none";
                    }
                });
            }

            window.addGraduationEffort = function() {
                const container = document.getElementById("graduation_efforts_container");
                if (!container) {
                    console.error('addGraduationEffort: Container not found.');
                    return;
                }
                const newEffortItem = document.createElement("div");
                newEffortItem.className = "graduation-effort-item";
                newEffortItem.innerHTML = '<input type="text" class="graduation_effort" placeholder="例: 3年間の成長の軌跡" value=""> <button type="button" onclick="window.removeGraduationEffort(this)">削除</button>';
                container.appendChild(newEffortItem);
                saveCurrentState();
            };

            window.removeGraduationEffort = function(element) {
                if (element && element.parentElement) {
                    element.parentElement.remove();
                    saveCurrentState();
                } else {
                    console.error('removeGraduationEffort: Element or parent not found.');
                }
            };

            function getCurrentState() {
                const state = {
                    role: roleSelect ? roleSelect.value : "",
                    otherRole: (roleSelect && roleSelect.value === "その他" && otherRoleInput) ? otherRoleInput.value : "",
                    task: taskSelect ? taskSelect.value : "",
                    otherTask: (taskSelect && taskSelect.value === "その他" && otherTaskInput) ? otherTaskInput.value : "",
                    topic: topicInput ? topicInput.value : "",
                    topicDetails: topicDetailsInput ? topicDetailsInput.value : "",
                    eventDetails: eventDetailsInput ? eventDetailsInput.value : "",
                    grade: gradeSelect ? gradeSelect.value : "",
                    subject: subjectSelect ? subjectSelect.value : "",
                    unit: unitInput ? unitInput.value : "",
                    evaluationPoint: evaluationPointInput ? evaluationPointInput.value : "",
                    essayTheme: essayThemeInput ? essayThemeInput.value : "",
                    specificContent: specificContentInput ? specificContentInput.value : "",
                    graduationEfforts: graduationEffortsContainer ? Array.from(graduationEffortsContainer.querySelectorAll('.graduation_effort')).map(el => el.value).filter(el => el) : [],
                    selectedConstraints: constraintSelector ? constraintSelector.selectedConstraints : [],
                    outputFormat: outputFormatSelect ? outputFormatSelect.value : "",
                    charCount: charCountInput ? charCountInput.value : "",
                    inputText: inputTextarea ? inputTextarea.value : "",
                    generatedPrompt: promptOutputTextarea ? promptOutputTextarea.value : "",
                };
                return state;
            }

            let saveTimer;
            async function saveCurrentState() {
                clearTimeout(saveTimer);
                saveTimer = setTimeout(async () => {
                    const state = getCurrentState();
                    await saveData(state);
                }, 500);
            }

            function resetUI() {
                if (roleSelect) roleSelect.value = "教師";
                if (otherRoleInput) { otherRoleInput.value = ""; otherRoleInput.style.display = "none"; }
                if (taskSelect) taskSelect.value = ""; // Modified: Set default task to empty
                if (otherTaskInput) { otherTaskInput.value = ""; otherTaskInput.style.display = "none"; }

                if (taskSelect) updateDynamicFields(taskSelect.value);
                if (topicInput) topicInput.value = "";
                if (topicDetailsInput) topicDetailsInput.value = "";
                if (eventDetailsInput) eventDetailsInput.value = "";
                if (gradeSelect) gradeSelect.value = "";
                if (subjectSelect) subjectSelect.value = "";
                if (unitInput) unitInput.value = "";
                if (evaluationPointInput) evaluationPointInput.value = "";
                if (essayThemeInput) essayThemeInput.value = "";
                if (specificContentInput) specificContentInput.value = "";
                if (graduationEffortsContainer) {
                    graduationEffortsContainer.innerHTML = `
                        <div class="graduation-effort-item">
                            <input type="text" class="graduation_effort" placeholder="例: 3年間の成長の軌跡" value="">
                            <button type="button" onclick="window.removeGraduationEffort(this)">削除</button>
                        </div>
                    `;
                }

                // 制約条件の初期化は、初回ロード時のデフォルト設定に任せるため、ここでは行わない
                // if (constraintSelector) constraintSelector.selectedConstraints = [];

                if (outputFormatSelect) outputFormatSelect.value = "";
                if (charCountInput) charCountInput.value = "";
                if (inputTextarea) inputTextarea.value = ""; // 入力文を空欄に設定
                // カスタム制約条件はconstraintSelectorの初期化で処理されるため、ここでの明示的なクリアは不要
                // ただし、追加されたカスタム要素を確実に消すために、以下のように追加することも可能
                const additionalConstraintsContainer = constraintSelector.shadowRoot.getElementById('additionalConstraints');
                if (additionalConstraintsContainer) {
                    additionalConstraintsContainer.innerHTML = '';
                }

                if (promptOutputTextarea) promptOutputTextarea.value = "";

                document.querySelectorAll('dynamic-form-group').forEach(group => group.style.display = 'none');
                if (taskSelect) updateDynamicFields(taskSelect.value);
            }

        }); // DOMContentLoaded end

        // グローバル関数（Web Componentsの外からアクセスされるため）
        function generatePrompt() {
            const getComponentValue = (selector) => {
                const comp = document.querySelector(selector);
                return comp ? comp.value : '';
            };
            const getComponentDisplay = (selector) => {
                const comp = document.querySelector(selector);
                return comp ? comp.style.display : 'none';
            };

            const role = getComponentValue('prompt-select#role');
            const otherRole = getComponentValue('text-input#otherRole');
            const finalRole = (role === "その他" && getComponentDisplay('text-input#otherRole') === "block") ? otherRole : role;

            const task = getComponentValue('prompt-select#task');
            const otherTask = getComponentValue('text-input#otherTask');
            const finalTask = (task === "その他" && getComponentDisplay('text-input#otherTask') === "block") ? otherTask : task;

            let prompt = `# 命令文：\nあなたはプロの${finalRole}です。以下の条件に従って最高の結果を出力してください。\n`;
            
            if (finalTask) { // 作業内容が空でない場合のみ追加
                prompt += `# 作業内容：\n・${finalTask}\n`;
            }

            const addFieldIfVisible = (selector, prefix = "", suffix = "") => {
                const element = document.querySelector(selector);
                if (!element) return;

                // Check if the element is part of a visible dynamic-form-group
                const dynamicGroup = element.closest('dynamic-form-group');
                const isDynamicGroupVisible = dynamicGroup && dynamicGroup.style.display === 'block';

                // Check if the element is not inside a dynamic-form-group OR its dynamic-form-group is visible
                // And ensure it has a value
                if (element.value && (!dynamicGroup || isDynamicGroupVisible)) {
                    prompt += `${prefix}${element.value}${suffix}\n`;
                }
            };
            
            if (task === "学年通信文例作成") {
                addFieldIfVisible('text-input#topic', '# 主な話題：\n・');
                addFieldIfVisible('textarea-input#topic_details', '# 話題の詳細：\n・');
            }

            if (task === "イベント企画") {
                addFieldIfVisible('text-input#event_details', '# イベントの詳細：\n・');
            }

            if (["教材作成", "授業計画作成", "テスト作成", "所見文作成", "研究レポート作成", "単元計画作成"].includes(task)) {
                addFieldIfVisible('prompt-select#grade', '# 学年：\n・');
                addFieldIfVisible('prompt-select#subject', '# 教科：\n・');
                addFieldIfVisible('text-input#unit', '# 単元名：\n・');
            }

            if (task === "所見文作成") {
                addFieldIfVisible('textarea-input#evaluation_point', '# 評価ポイント:\n・');
            }

            if (task === "卒業式式辞例文作成") {
                const graduationEffortsContainer = document.getElementById("graduation_fields");
                if (graduationEffortsContainer && graduationEffortsContainer.style.display === 'block') {
                    const graduationEfforts = Array.from(document.querySelectorAll('#graduation_efforts_container .graduation_effort')).map(el => el.value).filter(el => el);
                    if (graduationEfforts.length > 0) {
                        prompt += `# 式辞の内容：\n`;
                        graduationEfforts.forEach(effort => prompt += `・${effort}\n`);
                    }
                }
            }

            if (task === "教育論文作成") {
                addFieldIfVisible('text-input#essay_theme', '# テーマ：\n・');
            }

            if (["生徒指導", "保護者対応", "会議資料作成", "研修資料作成", "校内広報誌作成", "イベント企画", "進路相談", "いじめ対応", "不登校対応", "特別支援教育計画", "ICT活用計画", "メール文作成"].includes(task)) {
                addFieldIfVisible('textarea-input#specific_content', '# 具体的な内容：\n・');
            }

            const constraintSelector = document.querySelector('constraint-selector');
            const allConstraints = constraintSelector ? constraintSelector.selectedConstraints : [];

            if (allConstraints.length > 0) {
                prompt += `# 制約条件：\n`;
                allConstraints.forEach(constraint => prompt += `・${constraint}\n`);
            }

            const outputFormat = getComponentValue('prompt-select#output_format');
            if (outputFormat) {
                prompt += `# 出力形式：\n・${outputFormat}\n`;
            }
            const inputText = getComponentValue('textarea-input#input_text');
            if (inputText) {
                prompt += `# 入力文：\n・${inputText}\n`;
            }
            const charCount = getComponentValue('numeric-input#char_count');
            
            // 文字数は制約条件でも指定されるため、重複を避けるために条件付きで追加
            const includesCharLimitConstraint = allConstraints.some(c => c.includes('文字以内に収める'));
            if (charCount && !includesCharLimitConstraint) {
                prompt += `# 文字数：\n・${charCount}文字`;
            } else if (charCount && includesCharLimitConstraint) {
                // 文字数が制約条件に含まれる場合でも、ユーザーが入力した文字数を反映させる
                // これはAIの解釈に委ねられるが、明示的に含めることでユーザーの意図を強調
                prompt += `\n# 追加指示：\n・文字数：${charCount}文字`;
            }
            
            prompt = prompt.trim();

            const promptOutputTextarea = document.querySelector('textarea-input#prompt_output');
            if (promptOutputTextarea) {
                promptOutputTextarea.value = prompt;
            } else {
                console.error('generatePrompt: prompt_output textarea not found.');
            }

            saveData(getCurrentState());
        }

        function copyPrompt() {
            const promptOutputTextarea = document.querySelector('textarea-input#prompt_output');
            if (!promptOutputTextarea) {
                console.error('copyPrompt: prompt_output textarea not found.');
                alert("コピーするプロンプトがありません。");
                return;
            }

            const promptText = promptOutputTextarea.value;
            navigator.clipboard.writeText(promptText)
                .then(() => {
                    alert("プロンプトがコピーされました！");
                })
                .catch(err => {
                    console.error('Failed to copy prompt: ', err);
                    alert("プロンプトのコピーに失敗しました。お使いのブラウザがクリップボードAPIに対応しているか、またはセキュリティ設定をご確認ください。");
                });
        }

        window.openCopilotWithPrompt = function() {
            const promptOutputTextarea = document.querySelector('textarea-input#prompt_output');
            const promptText = promptOutputTextarea ? promptOutputTextarea.value : '';
            if (!promptText) {
                alert("生成されたプロンプトがありません。先にプロンプトを生成してください。");
                return;
            }
            const copilotUrl = `https://copilot.microsoft.com/?q=${encodeURIComponent(promptText)}`;
            window.open(copilotUrl, '_blank');
        }
        
        function escapeHTML(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

    </script>
</body>

</html>
